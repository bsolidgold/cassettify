<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cassettify — Spotify Auth</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 2.5rem;
      max-width: 640px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #1DB954; }
    p { color: #aaa; margin-bottom: 1.5rem; font-size: 0.95rem; }
    .url-box {
      background: #0d0d0d;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 1rem;
      font-family: monospace;
      font-size: 0.8rem;
      word-break: break-all;
      text-align: left;
      color: #7ec8e3;
      margin-bottom: 1.5rem;
      cursor: pointer;
    }
    .url-box:hover { border-color: #1DB954; }
    button {
      background: #1DB954;
      color: #000;
      border: none;
      border-radius: 24px;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #1ed760; }
    .copied { color: #1DB954; font-size: 0.85rem; margin-top: 1rem; height: 1.2rem; }
    .error { color: #e74c3c; padding: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎵 Cassettify</h1>
    <p>Spotify authorization complete. Copy this URL and paste it back into your terminal.</p>
    <div class="url-box" id="url" onclick="copyUrl()">Loading...</div>
    <button onclick="copyUrl()">Copy URL</button>
    <div class="copied" id="copied"></div>
  </div>
  <script>
    const url = window.location.href;
    document.getElementById('url').textContent = url;

    function copyUrl() {
      navigator.clipboard.writeText(url).then(() => {
        document.getElementById('copied').textContent = '✓ Copied to clipboard';
        setTimeout(() => document.getElementById('copied').textContent = '', 2000);
      });
    }
  </script>
</body>
</html>
